name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Пропускаем CI если коммит от GitHub Actions (релизы)
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - name: Build firmware (dev & prod)
        run: pio run -e esp32dev -e esp32dev-production
      - name: Run unit tests (native)
        run: pio test -e native -vv
      - name: Route presence tests
        run: python -m unittest discover -s test -p "test_routes.py"
      - name: Generate compile_commands database
        continue-on-error: true
        run: |
          pip install compiledb
          # Базу достаточно сгенерировать для одного окружения, чтобы получить полный список исходников
          pio run -e esp32dev --target compiledb || true
          # Копируем compile_commands.json в корень репозитория – так её увидят clang-tidy и IWYU
          if [ -f .pio/build/esp32dev/compile_commands.json ]; then cp .pio/build/esp32dev/compile_commands.json ./ ; fi
      - name: Locate compile_commands.json
        id: cc
        run: |
          FILE=$(find . -name compile_commands.json | head -n1 || true)
          if [ -z "$FILE" ]; then echo "dir=." >> $GITHUB_OUTPUT; else echo "dir=$(dirname $FILE)" >> $GITHUB_OUTPUT; fi
      - name: Install clang-tidy & IWYU
        run: |
          sudo apt-get update && sudo apt-get install -y clang-tidy clang-tools iwyu
      - name: Run clang-tidy (baseline)
        continue-on-error: true
        run: |
          # run-clang-tidy может вернуть 1 — не считаем это ошибкой
          run-clang-tidy -p "${{ steps.cc.outputs.dir }}" -export-fixes clang_tidy_fixes.yaml || true
          # Если файл не создался (нет предупреждений) — создадим пустой
          if [ ! -f clang_tidy_fixes.yaml ]; then echo "# no warnings" > clang_tidy_fixes.yaml; fi
      - name: Run include-what-you-use (baseline)
        continue-on-error: true
        run: |
          python3 -m pip install iwyu
          iwyu_tool.py -p . src | tee iwyu_report.txt || true
          # Создадим файл, если IWYU ничего не вывело
          test -f iwyu_report.txt || touch iwyu_report.txt
      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            clang_tidy_fixes.yaml
            iwyu_report.txt
          if-no-files-found: warn
      - name: Install analysis tools (lizard, cloc)
        run: pip install lizard && sudo apt-get install -y cloc
      - name: Run lizard complexity report
        continue-on-error: true
        run: lizard -l cpp src include -C 15 -w -o lizard_report.txt || true
      - name: Run cloc duplication (copy-paste)
        continue-on-error: true
        run: cloc --by-file --duplicates src include | tee cloc_dup.txt || true
      - name: Upload metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-reports
          path: |
            lizard_report.txt
            cloc_dup.txt
          if-no-files-found: warn
      - name: Generate static analysis summary
        if: always()
        continue-on-error: true
        run: |
          echo "## 📊 Static Analysis Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f clang_tidy_fixes.yaml ]; then
            CT_WARN=$(grep -c "DiagnosticName:" clang_tidy_fixes.yaml || true)
            echo "- clang-tidy warnings: **$CT_WARN**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f iwyu_report.txt ]; then
            IWYU_WARN=$(grep -c "^\[" iwyu_report.txt || true)
            echo "- IWYU suggestions: **$IWYU_WARN**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f lizard_report.txt ]; then
            CCN_HIGH=$(awk '$4 > 15 {c++} END {print c+0}' lizard_report.txt)
            echo "- Functions with CCN>15: **$CCN_HIGH**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f cloc_dup.txt ]; then
            DUP_FILES=$(grep -c "DUPE" cloc_dup.txt || true)
            echo "- Duplicate file groups (cloc): **$DUP_FILES**" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Commit static analysis summary into docs
        if: github.ref == 'refs/heads/main'
        run: |
          SUMMARY_FILE="docs_src/development/static_analysis_summary.md"
          echo "<!-- autogenerated - CI -->" > $SUMMARY_FILE
          cat "$GITHUB_STEP_SUMMARY" >> $SUMMARY_FILE
      - name: Generate detailed tech-debt report (Markdown)
        run: |
          pip install pyyaml
          python scripts/gen_tech_debt_issues.py --artifacts . --out-md docs_src/development/tech_debt_auto.md
      - name: Copy raw analysis reports into docs (auto)
        if: github.ref == 'refs/heads/main'
        run: |
          REPORT_DIR="docs_src/development/auto_reports"
          mkdir -p "$REPORT_DIR"
          # Копируем файлы, если они существуют, добавляем суффикс _auto
          [ -f clang_tidy_fixes.yaml ] && cp clang_tidy_fixes.yaml "$REPORT_DIR/clang_tidy_fixes_auto.yaml"
          [ -f iwyu_report.txt ] && cp iwyu_report.txt "$REPORT_DIR/iwyu_report_auto.txt"
          [ -f lizard_report.txt ] && cp lizard_report.txt "$REPORT_DIR/lizard_report_auto.txt"
          [ -f cloc_dup.txt ] && cp cloc_dup.txt "$REPORT_DIR/cloc_dup_auto.txt"
          # Вставляем маркер autogenerated
          for f in "$REPORT_DIR"/*_auto.*; do
            if [ -f "$f" ] && ! grep -q "autogenerated - CI" "$f"; then
              printf '<!-- autogenerated - CI -->\n' | cat - "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            fi
          done
      - name: Commit tech-debt report into docs
        if: github.ref == 'refs/heads/main'
        run: |
          git add docs_src/development/static_analysis_summary.md docs_src/development/tech_debt_auto.md docs_src/development/auto_reports docs_src/development/auto_reports_summary.md
          git commit -m "docs: авто-апдейт статических отчётов (CI)" || echo "No changes"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true
      - name: Upload web_spiffs.bin
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webfs
          path: .pio/build/**/web_spiffs.bin
          if-no-files-found: warn

      # -------- MkDocs site build & deploy --------
      - name: Install MkDocs Material
        if: github.ref == 'refs/heads/main'
        run: |
          pip install mkdocs-material mkdocs-awesome-pages-plugin mkdocs-git-revision-date-localized-plugin

      - name: Build MkDocs site
        if: github.ref == 'refs/heads/main'
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          mkdocs gh-deploy --force --clean --verbose --dirty --message "docs: deploy MkDocs (CI)"

      # конец job 