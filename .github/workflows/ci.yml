name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Пропускаем CI если коммит от GitHub Actions (релизы)
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
      - name: Build firmware (dev & prod)
        run: pio run -e esp32dev -e esp32dev-production
      - name: Run unit tests (native)
        run: pio test -e native -vv
      - name: Route presence tests
        run: python -m unittest discover -s test -p "test_routes.py"
      - name: Generate compile_commands database
        continue-on-error: true
        run: |
          pip install compiledb && pio run -e native --target compiledb || true
      - name: Install clang-tidy & IWYU
        run: |
          sudo apt-get update && sudo apt-get install -y clang-tidy clang-tools iwyu
      - name: Run clang-tidy (baseline)
        continue-on-error: true
        run: |
          run-clang-tidy -p . -quiet -export-fixes clang_tidy_fixes.yaml || true
      - name: Run include-what-you-use (baseline)
        continue-on-error: true
        run: |
          python3 -m pip install iwyu
          iwyu_tool.py -p . src | tee iwyu_report.txt || true
      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            clang_tidy_fixes.yaml
            iwyu_report.txt
          if-no-files-found: warn
      - name: Install analysis tools (lizard, cloc)
        run: pip install lizard && sudo apt-get install -y cloc
      - name: Run lizard complexity report
        continue-on-error: true
        run: lizard -l cpp src include -C 15 -w -o lizard_report.txt || true
      - name: Run cloc duplication (copy-paste)
        continue-on-error: true
        run: cloc --by-file --duplicates src include | tee cloc_dup.txt || true
      - name: Upload metrics artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-reports
          path: |
            lizard_report.txt
            cloc_dup.txt
          if-no-files-found: warn
      - name: Generate static analysis summary
        if: always()
        continue-on-error: true
        run: |
          echo "## 📊 Static Analysis Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f clang_tidy_fixes.yaml ]; then
            CT_WARN=$(grep -c "DiagnosticName:" clang_tidy_fixes.yaml || true)
            echo "- clang-tidy warnings: **$CT_WARN**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f iwyu_report.txt ]; then
            IWYU_WARN=$(grep -c "^\[" iwyu_report.txt || true)
            echo "- IWYU suggestions: **$IWYU_WARN**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f lizard_report.txt ]; then
            CCN_HIGH=$(awk '$4 > 15 {c++} END {print c+0}' lizard_report.txt)
            echo "- Functions with CCN>15: **$CCN_HIGH**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f cloc_dup.txt ]; then
            DUP_FILES=$(grep -c "DUPE" cloc_dup.txt || true)
            echo "- Duplicate file groups (cloc): **$DUP_FILES**" >> $GITHUB_STEP_SUMMARY
          fi

      # конец job 